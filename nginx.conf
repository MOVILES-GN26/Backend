server {
    listen 80;

    # Proxy MinIO object storage — bucket paths like /andeshub/<file>
    location /andeshub/ {
        proxy_pass         http://minio:9000/andeshub/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large uploads through this path if needed
        client_max_body_size 50M;
    }

    # Proxy everything else to the NestJS API
    location / {
        proxy_pass         http://api:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
    }
}
